<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beaver's Bathroom Blitz - Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦫</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      color: #FFD54F;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 span { font-size: 1.5em; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(180deg, #2d2d44, #1f1f33);
      border-radius: 12px;
      padding: 20px;
      border: 2px solid #3d3d5c;
    }

    .stat-card.highlight {
      border-color: #4CAF50;
      background: linear-gradient(180deg, #1b3d1b, #142814);
    }

    .stat-card.revenue {
      border-color: #FFD54F;
      background: linear-gradient(180deg, #3d3520, #2d2818);
    }

    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: #fff;
    }

    .stat-label {
      color: #aaa;
      font-size: 0.9em;
      margin-top: 4px;
    }

    .section {
      background: #2d2d44;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      color: #FFD54F;
      margin-bottom: 16px;
      font-size: 1.2em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #3d3d5c;
    }

    th {
      color: #FFD54F;
      font-weight: 600;
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: bold;
    }

    .badge.game-start { background: #2196F3; }
    .badge.shift-complete { background: #4CAF50; }
    .badge.game-over { background: #f44336; }
    .badge.daily-start { background: #9C27B0; }
    .badge.purchase { background: #FFD54F; color: #000; }
    .badge.outfitter-open { background: #E91E63; }
    .badge.outfitter-equip { background: #00BCD4; }
    .badge.outfitter-purchase { background: #FF9800; }
    .badge.outfitter-unlock { background: #8BC34A; }

    .loading {
      color: #888;
      padding: 20px;
      text-align: center;
    }

    .refresh-btn {
      background: #4CAF50;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-left: auto;
    }

    .refresh-btn:hover {
      background: #45a049;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 8px 16px;
      background: #3d3d5c;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }

    .tab.active {
      background: #FFD54F;
      color: #000;
    }

    .time-ago {
      color: #888;
      font-size: 0.85em;
    }

    .empty {
      color: #666;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🦫</span> Admin Dashboard</h1>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid" id="stats-grid">
    <div class="loading">Loading stats...</div>
  </div>

  <!-- Purchases Section -->
  <div class="section">
    <h2>💰 Purchases</h2>
    <div id="purchases-table">
      <div class="loading">Loading purchases...</div>
    </div>
  </div>

  <!-- Visitors Section -->
  <div class="section">
    <h2>👀 Unique Visitors</h2>
    <div id="visitor-stats" class="stats-grid" style="margin-bottom: 16px;">
      <div class="loading">Loading visitor stats...</div>
    </div>
    <div id="visitors-table">
      <div class="loading">Loading visitors...</div>
    </div>
  </div>

  <!-- Users Section -->
  <div class="section">
    <h2>👥 Registered Users</h2>
    <div id="users-table">
      <div class="loading">Loading users...</div>
    </div>
  </div>

  <!-- Outfitter Activity Section -->
  <div class="section">
    <h2>🎨 Outfitter Activity</h2>
    <div id="outfitter-stats" class="stats-grid" style="margin-bottom: 16px;">
      <div class="loading">Loading outfitter stats...</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-outfitter-filter="">All</button>
      <button class="tab" data-outfitter-filter="outfitter_open">Opens</button>
      <button class="tab" data-outfitter-filter="outfitter_equip">Equips</button>
      <button class="tab" data-outfitter-filter="outfitter_purchase">Purchases</button>
      <button class="tab" data-outfitter-filter="outfitter_unlock">Unlocks</button>
    </div>
    <div id="outfitter-table">
      <div class="loading">Loading outfitter events...</div>
    </div>
  </div>

  <!-- Recent Events Section -->
  <div class="section">
    <h2>📊 Recent Events</h2>
    <div class="tabs">
      <button class="tab active" data-filter="">All</button>
      <button class="tab" data-filter="game_start">Game Starts</button>
      <button class="tab" data-filter="shift_complete">Shift Complete</button>
      <button class="tab" data-filter="game_over">Game Over</button>
      <button class="tab" data-filter="daily_start">Daily Challenge</button>
    </div>
    <div id="events-table">
      <div class="loading">Loading events...</div>
    </div>
  </div>

  <script type="module">
    const CONVEX_URL = "https://little-sparrow-617.convex.cloud";

    // Simple Convex HTTP query function
    async function convexQuery(functionPath, args = {}) {
      const response = await fetch(`${CONVEX_URL}/api/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: functionPath, args, format: "json" })
      });
      const result = await response.json();
      if (result.status === "error") throw new Error(result.errorMessage);
      return result.value;
    }

    let currentFilter = "";
    let currentOutfitterFilter = "";

    // Time ago helper
    function timeAgo(timestamp) {
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    // Format date
    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleString();
    }

    // Load stats
    async function loadStats() {
      try {
        const stats = await convexQuery("admin:getStats", {});
        document.getElementById('stats-grid').innerHTML = `
          <div class="stat-card revenue">
            <div class="stat-value">$${stats.totalRevenue.toFixed(2)}</div>
            <div class="stat-label">Total Revenue</div>
          </div>
          <div class="stat-card highlight">
            <div class="stat-value">${stats.totalPurchases}</div>
            <div class="stat-label">Total Purchases</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.totalUsers}</div>
            <div class="stat-label">Registered Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.totalGameStarts}</div>
            <div class="stat-label">Total Game Starts</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.gameStartsToday}</div>
            <div class="stat-label">Games Today</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.gameStartsThisWeek}</div>
            <div class="stat-label">Games This Week</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.totalScoresSubmitted}</div>
            <div class="stat-label">Scores Submitted</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.totalDailyChallenges}</div>
            <div class="stat-label">Daily Challenges</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load stats:', e);
        document.getElementById('stats-grid').innerHTML = `<div class="loading">Failed to load stats</div>`;
      }
    }

    // Load purchases
    async function loadPurchases() {
      try {
        const purchases = await convexQuery("admin:getPurchases", {});
        if (purchases.length === 0) {
          document.getElementById('purchases-table').innerHTML = `<div class="empty">No purchases yet</div>`;
          return;
        }
        document.getElementById('purchases-table').innerHTML = `
          <table>
            <tr>
              <th>Email</th>
              <th>Amount</th>
              <th>Device ID</th>
              <th>Date</th>
            </tr>
            ${purchases.map(p => `
              <tr>
                <td>${p.email}</td>
                <td>$${(p.amount / 100).toFixed(2)}</td>
                <td><code>${p.deviceId ? p.deviceId.slice(0, 8) + '...' : 'N/A'}</code></td>
                <td>${formatDate(p.createdAt)} <span class="time-ago">(${timeAgo(p.createdAt)})</span></td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        console.error('Failed to load purchases:', e);
        document.getElementById('purchases-table').innerHTML = `<div class="loading">Failed to load purchases</div>`;
      }
    }

    // Load users
    async function loadUsers() {
      try {
        const users = await convexQuery("admin:getUsers", {});
        if (users.length === 0) {
          document.getElementById('users-table').innerHTML = `<div class="empty">No users yet</div>`;
          return;
        }
        document.getElementById('users-table').innerHTML = `
          <table>
            <tr>
              <th>Name</th>
              <th>Device ID</th>
              <th>Joined</th>
            </tr>
            ${users.map(u => `
              <tr>
                <td>${u.name}</td>
                <td><code>${u.deviceId.slice(0, 12)}...</code></td>
                <td>${formatDate(u.createdAt)} <span class="time-ago">(${timeAgo(u.createdAt)})</span></td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        console.error('Failed to load users:', e);
        document.getElementById('users-table').innerHTML = `<div class="loading">Failed to load users</div>`;
      }
    }

    // Load events
    async function loadEvents(filter = "") {
      try {
        const args = { limit: 100 };
        if (filter) args.type = filter;

        const events = await convexQuery("admin:getGameEvents", args);
        if (events.length === 0) {
          document.getElementById('events-table').innerHTML = `<div class="empty">No events yet</div>`;
          return;
        }

        document.getElementById('events-table').innerHTML = `
          <table>
            <tr>
              <th>Type</th>
              <th>Device</th>
              <th>Data</th>
              <th>Time</th>
            </tr>
            ${events.map(e => `
              <tr>
                <td><span class="badge ${e.type.replace('_', '-')}">${e.type}</span></td>
                <td><code>${e.deviceId ? e.deviceId.slice(0, 8) + '...' : 'N/A'}</code></td>
                <td>${e.data ? JSON.stringify(e.data).slice(0, 50) : '-'}</td>
                <td><span class="time-ago">${timeAgo(e.createdAt)}</span></td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        console.error('Failed to load events:', e);
        document.getElementById('events-table').innerHTML = `<div class="loading">Failed to load events</div>`;
      }
    }

    // Load visitor stats
    async function loadVisitorStats() {
      try {
        const stats = await convexQuery("admin:getVisitorStats", {});
        document.getElementById('visitor-stats').innerHTML = `
          <div class="stat-card highlight">
            <div class="stat-value">${stats.totalVisitors}</div>
            <div class="stat-label">Total Visitors</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.visitorsToday}</div>
            <div class="stat-label">Active Today</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.newVisitorsToday}</div>
            <div class="stat-label">New Today</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.conversionToPlay}%</div>
            <div class="stat-label">Played Game</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.conversionToComplete}%</div>
            <div class="stat-label">Completed Shift</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.mobilePercent}%</div>
            <div class="stat-label">Mobile</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load visitor stats:', e);
        document.getElementById('visitor-stats').innerHTML = `<div class="loading">Failed to load</div>`;
      }
    }

    // Load visitors table
    async function loadVisitors() {
      try {
        const visitors = await convexQuery("admin:getVisitors", { limit: 50 });
        if (visitors.length === 0) {
          document.getElementById('visitors-table').innerHTML = `<div class="empty">No visitors yet</div>`;
          return;
        }
        document.getElementById('visitors-table').innerHTML = `
          <table>
            <tr>
              <th>Device</th>
              <th>Platform</th>
              <th>Visits</th>
              <th>Played</th>
              <th>First Seen</th>
              <th>Last Seen</th>
            </tr>
            ${visitors.slice(0, 20).map(v => `
              <tr>
                <td><code>${v.deviceId.slice(0, 12)}...</code></td>
                <td>${v.platform || 'unknown'}</td>
                <td>${v.visitCount}</td>
                <td>${v.hasPlayed ? '✅' : '❌'} ${v.hasCompleted ? '🏆' : ''} ${v.hasPurchased ? '💰' : ''}</td>
                <td><span class="time-ago">${timeAgo(v.firstSeen)}</span></td>
                <td><span class="time-ago">${timeAgo(v.lastSeen)}</span></td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        console.error('Failed to load visitors:', e);
        document.getElementById('visitors-table').innerHTML = `<div class="loading">Failed to load</div>`;
      }
    }

    // Load outfitter stats
    async function loadOutfitterStats() {
      try {
        const events = await convexQuery("admin:getGameEvents", { limit: 500 });
        const outfitterEvents = events.filter(e => e.type && e.type.startsWith('outfitter_'));
        const opens = outfitterEvents.filter(e => e.type === 'outfitter_open').length;
        const equips = outfitterEvents.filter(e => e.type === 'outfitter_equip').length;
        const purchases = outfitterEvents.filter(e => e.type === 'outfitter_purchase').length;
        const unlocks = outfitterEvents.filter(e => e.type === 'outfitter_unlock').length;
        document.getElementById('outfitter-stats').innerHTML = `
          <div class="stat-card highlight">
            <div class="stat-value">${outfitterEvents.length}</div>
            <div class="stat-label">Total Outfitter Events</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${opens}</div>
            <div class="stat-label">Opens</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${equips}</div>
            <div class="stat-label">Equips</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${purchases}</div>
            <div class="stat-label">Purchases</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${unlocks}</div>
            <div class="stat-label">Unlocks</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load outfitter stats:', e);
        document.getElementById('outfitter-stats').innerHTML = `<div class="loading">Failed to load</div>`;
      }
    }

    // Load outfitter events
    async function loadOutfitterEvents(filter = "") {
      try {
        const events = await convexQuery("admin:getGameEvents", { limit: 100 });
        const filtered = events.filter(e => {
          if (!e.type || !e.type.startsWith('outfitter_')) return false;
          if (filter && e.type !== filter) return false;
          return true;
        });
        if (filtered.length === 0) {
          document.getElementById('outfitter-table').innerHTML = `<div class="empty">No outfitter events yet</div>`;
          return;
        }
        document.getElementById('outfitter-table').innerHTML = `
          <table>
            <tr>
              <th>Type</th>
              <th>Device</th>
              <th>Details</th>
              <th>Time</th>
            </tr>
            ${filtered.map(e => `
              <tr>
                <td><span class="badge ${e.type.replace('_', '-')}">${e.type}</span></td>
                <td><code>${e.deviceId ? e.deviceId.slice(0, 8) + '...' : 'N/A'}</code></td>
                <td>${e.data ? JSON.stringify(e.data).slice(0, 50) : '-'}</td>
                <td><span class="time-ago">${timeAgo(e.createdAt)}</span></td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        console.error('Failed to load outfitter events:', e);
        document.getElementById('outfitter-table').innerHTML = `<div class="loading">Failed to load</div>`;
      }
    }

    // Load all data
    window.loadData = async function() {
      await Promise.all([
        loadStats(),
        loadVisitorStats(),
        loadVisitors(),
        loadPurchases(),
        loadUsers(),
        loadOutfitterStats(),
        loadOutfitterEvents(currentOutfitterFilter),
        loadEvents(currentFilter),
      ]);
    };

    // Tab filtering for events
    document.querySelectorAll('.tab[data-filter]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab[data-filter]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        loadEvents(currentFilter);
      });
    });

    // Tab filtering for outfitter
    document.querySelectorAll('.tab[data-outfitter-filter]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab[data-outfitter-filter]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentOutfitterFilter = tab.dataset.outfitterFilter;
        loadOutfitterEvents(currentOutfitterFilter);
      });
    });

    // Initial load
    loadData();

    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
